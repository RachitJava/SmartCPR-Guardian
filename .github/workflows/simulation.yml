name: SmartCPR Simulation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify-simulation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AI Engine Simulation
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python ai_engine/fold_rm.py --ci

    - name: Verify Alert System
      run: |
        python alert_system/dispatcher.py --help
